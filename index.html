<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');
:root{
  --green:#25D366;--green-dark:#128C7E;--green-dim:rgba(37,211,102,0.08);
  --bg:#080d0a;--bg2:#0d1510;--card:#101a12;--card2:#142018;
  --border:#1c3022;--border2:#254030;--text:#dff0e2;--muted:#6b9478;
  --white:#ffffff;--red:#ff5252;--step-inactive:#1c3022;
  --lang-bar-h:38px;--topbar-h:69px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-style:normal;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;}

/* LANG SWITCHER */
.lang-bar{
  position:fixed;top:0;left:0;right:0;z-index:999;
  display:flex;justify-content:center;align-items:center;gap:0.4rem;
  min-height:var(--lang-bar-h);box-sizing:border-box;
  padding:0.5rem 1rem;
  background:rgba(8,13,10,0.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.lang-btn{
  padding:0.28rem 0.75rem;border-radius:50px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:0.72rem;font-weight:700;
  font-family:'Inter',sans-serif;cursor:pointer;
  transition:all 0.18s;letter-spacing:0.5px;
}
.lang-btn.active{background:var(--green);border-color:var(--green);color:#000;}
.lang-btn:hover:not(.active){border-color:var(--green);color:var(--green);}

/* GLOW */
.bg-glow{
  position:fixed;width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(37,211,102,0.07) 0%,transparent 70%);
  top:-200px;left:50%;transform:translateX(-50%);
  pointer-events:none;z-index:0;
}

/* WELCOME */
#page-welcome{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;
  min-height:100vh;padding:5rem 1.5rem 2rem;
  position:relative;overflow:hidden;
}
.logo-pulse{
  width:90px;height:90px;border-radius:50%;
  background:linear-gradient(145deg,var(--green),var(--green-dark));
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1rem;
  box-shadow:0 0 0 0 rgba(37,211,102,0.4);
  animation:ripple 2.5s ease-in-out infinite;
  position:relative;z-index:2;
}
.logo-pulse svg{width:46px;height:46px;fill:#fff;}
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(37,211,102,0.45);}70%{box-shadow:0 0 0 22px rgba(37,211,102,0);}100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}}
.brand-label{font-size:0.68rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;position:relative;z-index:2;}
.hero-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(2.8rem,9vw,4.8rem);font-weight:800;line-height:0.95;
  text-transform:uppercase;letter-spacing:1px;color:var(--white);
  position:relative;z-index:2;margin-bottom:0.6rem;
}
.hero-title .accent{color:var(--green);}
.hero-sub{font-size:0.93rem;color:var(--muted);max-width:340px;line-height:1.65;position:relative;z-index:2;margin-bottom:1.6rem;}
.steps-preview{display:flex;gap:0.5rem;margin-bottom:1.8rem;position:relative;z-index:2;flex-wrap:wrap;justify-content:center;}
.step-pill{background:var(--card);border:1px solid var(--border);border-radius:50px;padding:0.32rem 0.75rem;font-size:0.7rem;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:0.32rem;}
.step-pill .num{width:16px;height:16px;border-radius:50%;background:var(--green);color:#000;font-size:0.6rem;font-weight:800;display:flex;align-items:center;justify-content:center;}
.social-row{display:flex;gap:0.6rem;margin-bottom:1.8rem;position:relative;z-index:2;flex-wrap:wrap;justify-content:center;}
.s-pill{display:flex;align-items:center;gap:0.4rem;padding:0.38rem 0.85rem;border-radius:50px;font-size:0.73rem;font-weight:600;text-decoration:none;border:1px solid;transition:transform 0.18s,box-shadow 0.18s;}
.s-pill:hover{transform:translateY(-2px);}
.s-pill.wa{background:rgba(37,211,102,0.1);border-color:var(--green);color:var(--green);}
.s-pill.gh{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.15);color:var(--text);}
.s-pill.wa:hover{box-shadow:0 4px 14px rgba(37,211,102,0.25);}
.anime-box{position:relative;z-index:2;width:min(360px,88vw);height:175px;border-radius:14px;background:var(--card);border:1px solid var(--border);overflow:hidden;margin-bottom:1.8rem;box-shadow:0 12px 40px rgba(0,0,0,0.6);}
.anime-canvas{width:100%;height:100%;display:block;}
.btn-start{position:relative;z-index:2;background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff;border:none;padding:0.85rem 2.6rem;border-radius:50px;font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 20px rgba(37,211,102,0.35);transition:transform 0.18s,box-shadow 0.18s;}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(37,211,102,0.5);}
.btn-install{position:relative;z-index:2;margin-top:0.9rem;background:transparent;color:var(--green);border:1.5px solid var(--green);padding:0.7rem 2.2rem;border-radius:50px;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:0.3px;cursor:pointer;display:flex;align-items:center;gap:0.5rem;transition:all 0.18s;animation:installPulse 2.2s ease-in-out infinite;}
.btn-install:hover{background:var(--green-dim);transform:translateY(-2px);}
@keyframes installPulse{0%,100%{box-shadow:0 0 0 0 rgba(37,211,102,0.0);}50%{box-shadow:0 0 0 6px rgba(37,211,102,0.12);}}

/* FORM PAGE */
#page-form{display:none;min-height:100vh;padding:0 0 5rem;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;background:rgba(8,13,10,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:var(--lang-bar-h);z-index:100;}
.topbar-logo{display:flex;align-items:center;gap:0.6rem;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;color:var(--white);text-transform:uppercase;letter-spacing:0.5px;}
.topbar-logo svg{width:26px;height:26px;fill:var(--green);}
.topbar-logo span{color:var(--green);}
.btn-back{background:transparent;border:1px solid var(--border);color:var(--muted);padding:0.35rem 0.9rem;border-radius:50px;font-size:0.78rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:border-color 0.2s,color 0.2s;display:flex;align-items:center;gap:0.3rem;}
.btn-back:hover{border-color:var(--green);color:var(--green);}
/* Topbar right */
.topbar-right{display:flex;align-items:center;gap:0.6rem;}
/* Hamburger button */
.ham-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:border-color 0.2s;}
.ham-btn:hover{border-color:var(--green);}
.ham-line{width:16px;height:1.5px;background:var(--muted);border-radius:2px;transition:background 0.2s;}
.ham-btn:hover .ham-line{background:var(--green);}
/* Drawer */
.ham-drawer{position:fixed;top:calc(var(--lang-bar-h) + var(--topbar-h));right:0;bottom:0;width:min(260px,78vw);background:var(--card);border-left:1px solid var(--border);z-index:90;transform:translateX(100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);padding:1.4rem 1.2rem;display:flex;flex-direction:column;gap:0.4rem;overflow-y:auto;}
.ham-drawer.open{transform:translateX(0);}
.ham-overlay{position:fixed;top:calc(var(--lang-bar-h) + var(--topbar-h));left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:89;display:none;}
.ham-overlay.open{display:block;}
.drawer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.drawer-title{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;text-transform:uppercase;color:var(--white);letter-spacing:0.5px;}
.drawer-close{background:transparent;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color 0.2s,color 0.2s;}
.drawer-close:hover{border-color:var(--red);color:var(--red);}
.drawer-close svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;}
/* Drawer steps */
.drawer-step{display:flex;align-items:center;gap:0.75rem;padding:0.7rem 0.85rem;border-radius:10px;border:1px solid transparent;transition:background 0.18s,border-color 0.18s;}
.drawer-step.active{background:rgba(37,211,102,0.08);border-color:rgba(37,211,102,0.2);}
.drawer-step.done{background:rgba(37,211,102,0.04);}
.ds-dot{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:var(--step-inactive);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:800;color:var(--muted);transition:all 0.2s;}
.drawer-step.done .ds-dot{background:var(--green);border-color:var(--green);color:#000;}
.drawer-step.active .ds-dot{background:var(--green-dark);border-color:var(--green);color:#fff;box-shadow:0 0 0 3px rgba(37,211,102,0.2);}
.ds-label{font-size:0.82rem;font-weight:700;color:var(--muted);}
.drawer-step.active .ds-label{color:var(--green);}
.drawer-step.done .ds-label{color:var(--text);}
.ds-hint{font-size:0.7rem;color:var(--border2);margin-top:1px;}
.drawer-step.active .ds-hint{color:var(--muted);}
.drawer-divider{height:1px;background:var(--border);margin:0.3rem 0;}
/* Lang in drawer */
.drawer-lang{display:flex;gap:0.4rem;margin-top:auto;padding-top:1rem;border-top:1px solid var(--border);}
.drawer-lang-btn{flex:1;padding:0.35rem;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.72rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.18s;text-align:center;}
.drawer-lang-btn.active{background:var(--green);border-color:var(--green);color:#000;}
.drawer-lang-btn:hover:not(.active){border-color:var(--green);color:var(--green);}
/* Current step indicator in topbar */
.step-indicator{font-size:0.72rem;font-weight:700;color:var(--muted);background:var(--bg2);border:1px solid var(--border);border-radius:50px;padding:0.25rem 0.7rem;}
.container{max-width:640px;margin:0 auto;padding:1.5rem 1rem 0;}
.sec-header{display:flex;align-items:center;gap:0.7rem;margin-bottom:1.2rem;}
.sec-icon{width:32px;height:32px;border-radius:8px;background:var(--green-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sec-icon svg{width:16px;height:16px;stroke:var(--green);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.sec-title{font-family:'Inter',sans-serif;font-size:0.78rem;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:1.5px;}
.sec-desc{font-size:0.78rem;color:var(--muted);margin-top:0.1rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.2rem;}
.field{margin-bottom:1rem;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-bottom:1rem;}
.field label{display:block;font-size:0.78rem;font-weight:600;color:var(--muted);margin-bottom:0.35rem;letter-spacing:0.3px;}
.field input,.field textarea,.field select{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);padding:0.7rem 0.9rem;font-size:0.9rem;font-family:'Inter',sans-serif;transition:border-color 0.2s,background 0.2s;outline:none;resize:none;}
.field input:focus,.field textarea:focus{border-color:var(--green);background:rgba(37,211,102,0.04);}
.field input.error{border-color:var(--red);}
.field input::placeholder,.field textarea::placeholder{color:#2a4030;}
.field-hint{font-size:0.72rem;color:var(--muted);margin-top:0.3rem;}
.field-hint.error{color:var(--red);font-weight:600;}
.phone-wrap{display:flex;gap:0.5rem;align-items:stretch;}
.phone-wrap .country-select{flex:0 0 88px;width:88px;min-width:88px;max-width:88px;background:var(--bg2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);padding:0.7rem 0.3rem;font-size:0.74rem;font-family:'Inter',sans-serif;outline:none;cursor:pointer;transition:border-color 0.2s;text-align:center;box-sizing:border-box;}
.phone-wrap .country-select:focus{border-color:var(--green);}
.phone-wrap .country-select.error{border-color:var(--red);}
.phone-wrap .phone-input{flex:1 1 auto;width:auto;min-width:0;}
.upload-zone{border:2px dashed var(--border2);border-radius:10px;padding:1.4rem;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;position:relative;overflow:hidden;}
.upload-zone:hover{border-color:var(--green);background:rgba(37,211,102,0.03);}
.upload-zone.has-files{border-color:var(--green);border-style:solid;}
.upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:none;background:none;padding:0;}
.upload-zone p{font-size:0.82rem;color:var(--muted);}
.upload-zone small{font-size:0.7rem;color:var(--border2);}
.preview-grid{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.8rem;}
.preview-img{width:64px;height:64px;border-radius:7px;object-fit:cover;border:2px solid var(--green);display:block;}
.preview-count{font-size:0.75rem;color:var(--green);margin-top:0.5rem;font-weight:600;}
.version-tabs{display:flex;background:var(--bg2);border-radius:10px;padding:3px;gap:3px;margin-bottom:1rem;border:1px solid var(--border);}
.vtab{flex:1;padding:0.45rem;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:0.78rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.18s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.vtab small{font-size:0.58rem;font-weight:500;opacity:0.7;}
.vtab.active{background:var(--card2);color:var(--green);box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.script-panel{display:none;}
.script-panel.active{display:block;}
.script-preview{background:rgba(37,211,102,0.04);border:1px solid rgba(37,211,102,0.15);border-radius:9px;padding:0.9rem;font-size:0.83rem;color:var(--text);line-height:1.75;white-space:pre-wrap;word-break:break-word;margin-top:0.7rem;max-height:130px;overflow-y:auto;border-left:3px solid var(--green);}
.faq-item{border-bottom:1px solid var(--border);padding:0.9rem 0;cursor:pointer;}
.faq-item:last-child{border-bottom:none;padding-bottom:0;}
.faq-q{font-size:0.85rem;font-weight:600;color:var(--text);display:flex;justify-content:space-between;align-items:center;gap:0.5rem;}
.faq-q .chevron{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;transition:transform 0.2s;flex-shrink:0;}
.faq-item.open .chevron{transform:rotate(180deg);}
.faq-a{font-size:0.8rem;color:var(--muted);line-height:1.6;margin-top:0.6rem;display:none;}
.faq-item.open .faq-a{display:block;}
.security-bar{display:flex;align-items:center;gap:0.5rem;background:rgba(37,211,102,0.05);border:1px solid rgba(37,211,102,0.12);border-radius:9px;padding:0.7rem 1rem;margin-bottom:1.2rem;}
.security-bar svg{width:16px;height:16px;stroke:var(--green);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.security-bar p{font-size:0.75rem;color:var(--muted);line-height:1.4;}
.security-bar strong{color:var(--green);}
.btn-submit{width:100%;background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff;border:none;padding:1rem;border-radius:12px;font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;box-shadow:0 4px 20px rgba(37,211,102,0.3);transition:transform 0.18s,box-shadow 0.18s,opacity 0.18s;display:flex;align-items:center;justify-content:center;gap:0.5rem;}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(37,211,102,0.45);}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-submit svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.spinner{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;animation:spin 0.7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.page-footer{text-align:center;margin-top:1.5rem;padding-bottom:1rem;}
.footer-links{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;margin-bottom:0.6rem;}
.footer-link{display:flex;align-items:center;gap:0.35rem;font-size:0.75rem;font-weight:600;color:var(--muted);text-decoration:none;transition:color 0.18s;}
.footer-link:hover{color:var(--green);}
.footer-brand{font-size:0.65rem;color:var(--border2);letter-spacing:2px;text-transform:uppercase;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);padding:0.75rem 1.4rem;border-radius:50px;font-size:0.85rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.4);transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);z-index:9999;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:#1a3d20;border:1px solid var(--green);color:var(--green);}
.toast.error{background:#3d1a1a;border:1px solid var(--red);color:var(--red);}
#success-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.success-circle{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--green-dark));display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;box-shadow:0 0 40px rgba(37,211,102,0.4);}
.success-circle svg{width:36px;height:36px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
#success-screen h2{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:800;text-transform:uppercase;color:var(--white);margin-bottom:0.5rem;}
#success-screen p{color:var(--muted);font-size:0.9rem;max-width:300px;line-height:1.6;margin-bottom:1.5rem;}
.btn-reset{background:transparent;border:1.5px solid var(--border2);color:var(--muted);padding:0.65rem 1.8rem;border-radius:50px;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;transition:border-color 0.2s,color 0.2s;}
.btn-reset:hover{border-color:var(--green);color:var(--green);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* FOCUS VISIBLE - aksesibilite klavye */
button:focus-visible,a:focus-visible,.lang-btn:focus-visible{
  outline:2px solid var(--green);outline-offset:2px;
}

/* ═══ INSTALL PROMPT MODAL (style DOBERTO-FLIX) ═══ */
#pwa-install-overlay{
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:flex-end;justify-content:center;
  background:rgba(0,0,0,0);
  transition:background 0.35s ease;
  pointer-events:none;
}
#pwa-install-overlay.visible{
  background:rgba(0,0,0,0.72);
  pointer-events:all;
}
#pwa-install-card{
  width:100%;max-width:480px;
  background:linear-gradient(180deg,#12191a 0%,#0d1210 100%);
  border-radius:22px 22px 0 0;
  padding:1.6rem 1.5rem 2rem;
  border-top:1px solid rgba(255,255,255,0.07);
  box-shadow:0 -20px 60px rgba(0,0,0,0.7);
  position:relative;
  transform:translateY(110%);
  transition:transform 0.42s cubic-bezier(0.34,1.56,0.64,1);
}
#pwa-install-overlay.visible #pwa-install-card{
  transform:translateY(0);
}
/* Drag handle */
.icard-handle{
  width:38px;height:4px;border-radius:4px;
  background:rgba(255,255,255,0.15);
  margin:0 auto 1.2rem;
}
/* Close button */
.icard-close{
  position:absolute;top:1rem;right:1rem;
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.55);font-size:1.1rem;line-height:1;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 0.2s;
}
.icard-close:hover{background:rgba(255,255,255,0.14);}
/* Logo area */
.icard-logo-row{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:1.1rem;
}
.icard-logo{
  width:72px;height:72px;border-radius:18px;
  background:linear-gradient(145deg,#e53935,#b71c1c);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:0.75rem;
  box-shadow:0 6px 24px rgba(229,57,53,0.35);
}
.icard-logo svg{width:40px;height:40px;fill:#fff;}
.icard-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.55rem;font-weight:800;letter-spacing:0.5px;
  color:#fff;text-align:center;line-height:1;
}
.icard-name span{color:#e53935;}
.icard-tagline{
  font-size:0.78rem;color:rgba(255,255,255,0.45);
  margin-top:0.3rem;text-align:center;
}
/* Chips row */
.icard-chips{
  display:flex;align-items:center;justify-content:center;
  gap:0.5rem;margin-bottom:1.2rem;flex-wrap:wrap;
}
.chip{
  display:flex;align-items:center;gap:0.3rem;
  padding:0.3rem 0.75rem;border-radius:50px;
  font-size:0.72rem;font-weight:700;font-family:'Inter',sans-serif;
  border:1.5px solid;white-space:nowrap;
}
.chip-red{background:rgba(229,57,53,0.12);border-color:#e53935;color:#ff6b6b;}
.chip-red svg{fill:#ff6b6b;}
.chip-neutral{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);}
.chip-green{background:rgba(37,211,102,0.1);border-color:#25D366;color:#25D366;}
.chip-green svg{fill:#25D366;}
/* Features */
.icard-features{
  display:grid;grid-template-columns:repeat(4,minmax(0,1fr));
  gap:0.4rem;margin-bottom:1.4rem;
}
.feat-item{
  display:flex;flex-direction:column;align-items:center;gap:0.3rem;
  padding:0.5rem 0.3rem;min-width:0;
  border-radius:10px;background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
}
.feat-label{font-size:0.65rem;color:rgba(255,255,255,0.45);font-weight:600;text-align:center;overflow-wrap:break-word;}
@media (max-width:340px){
  .icard-features{grid-template-columns:repeat(2,minmax(0,1fr));}
}
.feat-icon{
  width:26px;height:26px;border-radius:7px;
  background:rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
}
.feat-icon svg{width:14px;height:14px;stroke:rgba(255,255,255,0.5);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
/* Install button */
.icard-btn-install{
  width:100%;background:linear-gradient(135deg,#e53935,#c62828);
  color:#fff;border:none;
  padding:1rem;border-radius:13px;
  font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;
  letter-spacing:0.3px;cursor:pointer;
  box-shadow:0 4px 18px rgba(229,57,53,0.4);
  display:flex;align-items:center;justify-content:center;gap:0.5rem;
  transition:transform 0.18s,box-shadow 0.18s,opacity 0.18s;
  margin-bottom:0.75rem;
}
.icard-btn-install:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(229,57,53,0.55);}
.icard-btn-install:disabled{opacity:0.45;cursor:not-allowed;transform:none;}
.icard-btn-install svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
/* Skip link */
.icard-skip{
  display:block;text-align:center;
  font-size:0.8rem;color:rgba(255,255,255,0.35);
  cursor:pointer;transition:color 0.18s;padding:0.3rem;
  background:none;border:none;width:100%;font-family:'Inter',sans-serif;
}
.icard-skip:hover{color:rgba(255,255,255,0.65);}
</style>
</head>
<body>

<div class="bg-glow"></div>

<!-- LANG BAR -->
<div class="lang-bar">

  <button class="lang-btn" onclick="setLang('fr')">Français</button>
  <button class="lang-btn" onclick="setLang('en')">English</button>
</div>

<!-- WELCOME -->

// Longè (san kòd peyi) atandi pou chak kòd peyi yo gen nan select la
const phoneLenRules={
  '+509':{min:8,max:8},   // Ayiti: 8 chif
  '+1':{min:10,max:10},   // US/CA: 10 chif
  '+33':{min:9,max:9},    // Frans: 9 chif (san premye 0)
  '+44':{min:10,max:10},  // UK: 10 chif
  '+55':{min:10,max:11},  // Brezil: 10-11 chif
  '+212':{min:9,max:9},   // Maròk: 9 chif
  '+221':{min:9,max:9},   // Senegal: 9 chif
  '+237':{min:9,max:9},   // Kamewoun: 9 chif
  '+243':{min:9,max:9}    // Kongo (RDC): 9 chif
};
const phoneHintText={
  ht:{ok:"Ekri nimewo a san kòd peyi",bad:"Nimewo sa pa ale ak kòd peyi a chwazi",empty:"Tanpri antre nimewo WhatsApp ou"},
  fr:{ok:"Écrivez le numéro sans le code pays",bad:"Ce numéro ne correspond pas au code pays sélectionné",empty:"Veuillez entrer votre numéro WhatsApp"},
  en:{ok:"Enter number without country code",bad:"This number doesn't match the selected country code",empty:"Please enter your WhatsApp number"}
};
function validatePhone(showError){
  const codeEl=document.getElementById('countryCode');
  const phoneEl=document.getElementById('phone');
  const hintEl=document.getElementById('phoneHint');
  const code=codeEl.value;
  const raw=phoneEl.value.trim();
  const digits=raw.replace(/\D/g,'');
  const rule=phoneLenRules[code]||{min:7,max:15};
  const lang=phoneHintText[currentLang]?currentLang:'ht';
  const t=phoneHintText[lang];

  let valid=true, msg=t.ok;
  if(!raw){
    valid=false; msg=showError?t.empty:t.ok;
  } else if(digits.length!==raw.length){
    valid=false; msg=t.bad;
  } else if(digits.length<rule.min || digits.length>rule.max){
    valid=false; msg=t.bad;
  }

  phoneEl.classList.toggle('error',showError&&!valid);
  codeEl.classList.toggle('error',showError&&!valid);
  hintEl.textContent=msg;
  hintEl.classList.toggle('error',showError&&!valid);
  return valid;
}
document.getElementById('countryCode').addEventListener('change',()=>validatePhone(false));
document.getElementById('phone').addEventListener('input',()=>validatePhone(false));

  setStep(2);
}

let deferredInstallPrompt = null;
const installBtn = document.getElementById('installBtn');

function isAppInstalled(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  if(!isAppInstalled() && installBtn){
    installBtn.style.display = 'flex';
  }
});

async function installApp(){
  if(!deferredInstallPrompt) return;
  installBtn.style.display = 'none';
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
}

window.addEventListener('appinstalled', () => {
  if(installBtn) installBtn.style.display = 'none';
  deferredInstallPrompt = null;
});

if(isAppInstalled() && installBtn){
  installBtn.style.display = 'none';
}

// ─── CUSTOM PWA INSTALL MODAL ───
(function(){
  const overlay = document.getElementById('pwa-install-overlay');
  const btnInstall = document.getElementById('icard-btn');
  const btnSkip = document.getElementById('icard-skip');
  const btnClose = document.getElementById('icard-close');
  let deferred = null;

  function isStandalone(){
    return window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true;
  }

  function showModal(){
    if(overlay) overlay.classList.add('visible');
  }
  function hideModal(){
    if(overlay) overlay.classList.remove('visible');
  }

  // Don't show if already installed
  if(isStandalone()) return;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferred = e;
    // Show after short delay for better UX
    setTimeout(showModal, 1200);
  });

  window.addEventListener('appinstalled', hideModal);

  if(btnSkip) btnSkip.addEventListener('click', hideModal);
  if(btnClose) btnClose.addEventListener('click', hideModal);

  if(btnInstall){
    btnInstall.addEventListener('click', async () => {
      if(!deferred){ hideModal(); return; }
      btnInstall.disabled = true;
      btnInstall.innerHTML = '<div style="width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;animation:spin 0.7s linear infinite;"></div>';
      hideModal();
      deferred.prompt();
      await deferred.userChoice;
      deferred = null;
    });
  }

  // Close on overlay background click
  if(overlay){
    overlay.addEventListener('click', (e) => {
      if(e.target === overlay) hideModal();
    });
  }

  // Fallback: show modal after 3s on mobile if no beforeinstallprompt (iOS Safari)
  const ua = navigator.userAgent.toLowerCase();
  const isIOS = /iphone|ipad|ipod/.test(ua);
  if(isIOS && !isStandalone()){
    setTimeout(() => {
      if(!document.getElementById('pwa-install-overlay').classList.contains('visible')){
        // On iOS, disable install button (not supported), show share instruction
        if(btnInstall){
          btnInstall.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Pataje → Ajoute sou ekran';
          btnInstall.addEventListener('click', () => {
            alert('iOS: Peze bouton "Pataje" ⬆️ nan Safari, epi chwazi "Ajoute sou Ekran Prensipal"');
            hideModal();
          });
        }
        showModal();
      }
    }, 3000);
  }
})();
</script>
